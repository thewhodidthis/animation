<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="description" content="Helps setup rAF based loops.">
    <title>animation.js</title>
    <script src="example.js" type="module"></script>
    <style>
      html {
        font: medium/normal sans-serif;
        height: 100%;
      }
      body {
        display: grid;
        margin: 0;
        min-height: 100%;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      p {
        text-align: center;
      }
      canvas {
        background: white center/cover no-repeat;
        display: block;
      }
      img {
        height: auto;
        vertical-align: middle;
      }
      canvas,
      img {
        object-fit: cover;
        max-width: 100%;
      }
      figcaption {
        font-size: small;
      }
      figure {
        margin: auto;
      }
    </style>
  </head>
  <body>
    <figure>
      <canvas height="360" width="540" title="Tap to reset">
        <img src="screenshot.png" alt="Randomly generated fractal tree of black dots on a white canvas to demonstrate running a drawing function step by step on each animation frame" height="360" width="540">
      </canvas>
      <figcaption>
        <p><strong><a href="https://github.com/thewhodidthis/animation">animation.js</a></strong> rAF loop toggle</p>
      </figcaption>
    </figure>
  </body>
</html>
